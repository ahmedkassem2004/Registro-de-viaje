<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio2"</title>
    <style>
        :root {
            --bg: #000000;
            --card: #1a1a1a;
            --accent: #38bdf8;
            --text: #ffffff;
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            font-size: 14px; /* Tamaño base para pantallas pequeñas */
        }

        header {
            padding: 5px;
            text-align: center;
            background: #111;
            border-bottom: 1px solid var(--accent);
        }

        h1 { font-size: 16px; margin: 2px 0; }
        p { font-size: 10px; margin: 0; color: #ccc; }

        .search-container {
            display: flex;
            padding: 5px;
            gap: 4px;
        }

        input {
            flex: 1;
            padding: 6px;
            border-radius: 4px;
            border: none;
            background: var(--card);
            color: white;
            font-size: 12px;
            width: 60%;
        }

        button {
            padding: 6px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        /* Lista compacta para 2 pulgadas */
        .list {
            display: flex;
            flex-direction: column;
            padding: 5px;
            margin-bottom: 80px; /* Espacio para el reproductor */
        }

        .station-row {
            display: flex;
            align-items: center;
            background: var(--card);
            margin-bottom: 4px;
            padding: 6px;
            border-radius: 4px;
            border-left: 3px solid transparent;
        }

        .station-row:active {
            background: #333;
            border-left-color: var(--accent);
        }

        .station-row img {
            width: 30px;
            height: 30px;
            border-radius: 3px;
            margin-right: 8px;
        }

        .info { overflow: hidden; }

        .info h3 {
            font-size: 13px;
            margin: 0;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .info span {
            font-size: 10px;
            color: #888;
        }

        /* Reproductor ultra-compacto */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            padding: 5px;
            border-top: 1px solid var(--accent);
            text-align: center;
        }

        #current-station-name {
            display: block;
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
        }

        audio {
            width: 100%;
            height: 25px;
        }

        .loader { font-size: 12px; text-align: center; padding: 10px; }
    </style>
</head>
<body>

<header>
    <h1>🌍 MundialRadio</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="País o Género">
        <button onclick="searchStations()">OK</button>
    </div>
</header>

<div class="list" id="stationGrid">
    </div>

<div class="player-bar">
    <span id="current-station-name">Selecciona una radio</span>
    <audio id="audioPlayer" controls autoplay></audio>
</div>

<script>
    const stationGrid = document.getElementById('stationGrid');
    const audioPlayer = document.getElementById('audioPlayer');
    const currentName = document.getElementById('current-station-name');

    async function searchStations() {
        const query = document.getElementById('searchInput').value || 'topvote';
        stationGrid.innerHTML = '<div class="loader">Cargando...</div>';

        try {
            // Buscamos solo 25 para no saturar la memoria del teléfono
            const response = await fetch(`https://de1.api.radio-browser.info/json/stations/byname/${query}?limit=25`);
            const data = await response.json();
            displayStations(data);
        } catch (error) {
            stationGrid.innerHTML = '<div class="loader">Error de conexión</div>';
        }
    }

    function displayStations(stations) {
        stationGrid.innerHTML = '';
        if(stations.length === 0) {
            stationGrid.innerHTML = '<div class="loader">Sin resultados</div>';
            return;
        }

        stations.forEach(station => {
            const row = document.createElement('div');
            row.className = 'station-row';
            const favicon = station.favicon || 'https://via.placeholder.com/30?text=R';
            
            row.innerHTML = `
                <img src="${favicon}" onerror="this.src='https://via.placeholder.com/30?text=R'">
                <div class="info">
                    <h3>${station.name.substring(0, 20)}</h3>
                    <span>${station.country} | ${station.tags.split(',')[0]}</span>
                </div>
            `;
            
            row.onclick = () => playStation(station.url_resolved, station.name);
            stationGrid.appendChild(row);
        });
    }

    function playStation(url, name) {
        audioPlayer.src = url;
        audioPlayer.play();
        currentName.innerText = "▶ " + name;
        // Scroll automático al reproductor si fuera necesario
        window.scrollTo(0, document.body.scrollHeight);
    }

    window.onload = searchStations;
</script>

</body>
</html>
