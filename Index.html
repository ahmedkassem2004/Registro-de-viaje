<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Google Radar</title>
    <style>
        /* Optimizado para pantalla de 2 pulgadas */
        body { background: #000; color: #fff; font-family: monospace; margin: 4px; font-size: 13px; }
        
        .h { background: #4285F4; color: #fff; padding: 6px; text-align: center; font-weight: bold; border: 1px solid #fff; }
        
        .box { border: 1px solid #333; padding: 8px; margin-top: 10px; text-align: center; }
        
        input { 
            width: 90%; background: #111; color: #4285F4; border: 2px solid #4285F4; 
            padding: 10px; font-size: 16px; font-weight: bold; text-align: center; margin-bottom: 10px;
        }
        
        /* Botón estilo Google Aero */
        .btn { 
            display: block; width: 100%; background: #fff; color: #000; 
            border: none; padding: 12px; font-weight: bold; text-decoration: none;
            text-align: center; border-radius: 4px;
        }

        .info { font-size: 10px; color: #888; margin-top: 10px; text-align: center; }
        .real-data { color: #34A853; font-weight: bold; }
    </style>
</head>
<body>

<div class="h">GOOGLE VUELOS - RADAR</div>

<div class="box">
    <div style="margin-bottom:8px;">N° VUELO:</div>
    <input type="text" id="fn" placeholder="AV9710" maxlength="8">
    
    <a href="#" id="link" class="btn" onclick="goGoogle()">🔗 RASTREO EN VIVO</a>
</div>

<div class="info">
    Sincronizado con: <span class="real-data">Google Search / Flights</span><br>
    Muestra: Matrícula, Puerta y GPS Real.
</div>

<script>
function goGoogle() {
    var flight = document.getElementById('fn').value.toUpperCase().trim();
    if(flight === "") {
        alert("Escribe un vuelo");
        return false;
    }
    
    // Google Flights detecta el número de vuelo directamente en la búsqueda
    // Esta es la forma más rápida y ligera para el Nokia sin consumir RAM
    var googleUrl = "https://www.google.com/search?q=vuelo+" + flight;
    
    // Abrir el rastreador real de Google
    window.location.href = googleUrl;
}
</script>

</body>
</html>
