<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Vuelos - Powered by FlightAware</title>
    <style>
        :root {
            --primary-blue: #002e5d;
            --accent-blue: #0056b3;
            --light-bg: #f4f7f9;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: var(--primary-blue);
            color: white;
            width: 100%;
            padding: 1.5rem 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 800px;
            width: 90%;
            margin-top: 2rem;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .search-box {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        input[type="text"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-blue);
        }

        button {
            padding: 12px;
            background-color: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        button:hover {
            background-color: var(--primary-blue);
        }

        .results-info {
            margin-top: 2rem;
            border-top: 1px solid #eee;
            padding-top: 1rem;
        }

        .link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .link-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 1rem;
            border-radius: 8px;
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: 500;
            text-align: center;
            transition: transform 0.2s;
        }

        .link-card:hover {
            transform: translateY(-3px);
            background-color: #f0f4f8;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #777;
            padding-bottom: 2rem;
        }
    </style>
</head>
<body>

<header>
    <h1>Flight Tracker Live</h1>
    <p>Consulta datos de FlightAware en tiempo real</p>
</header>

<div class="container">
    <div class="search-box">
        <label for="flightNumber">Introduce el número de vuelo (ej. AVA123):</label>
        <input type="text" id="flightNumber" placeholder="Ej: IB6501, AAL12..." required>
        <button onclick="trackFlight()">Rastrear en FlightAware</button>
    </div>

    <div class="results-info">
        <h3>Enlaces rápidos (según tu búsqueda):</h3>
        <div class="link-grid">
            <a href="https://es.flightaware.com/live/" class="link-card" target="_blank">Rastreo en vivo</a>
            <a href="https://es.flightaware.com/live/findflight/" class="link-card" target="_blank">Localizador de vuelos</a>
            <a href="https://es.flightaware.com/analysis/index.rvt" class="link-card" target="_blank">Cancelaciones y retrasos</a>
            <a href="https://www.flightaware.com/mobile/" class="link-card" target="_blank">App Móvil</a>
        </div>
    </div>
</div>

<footer>
    Datos adaptados de la consulta JSON de SerpApi | 2026
</footer>

<script>
    function trackFlight() {
        const flight = document.getElementById('flightNumber').value.trim();
        if (flight) {
            // Construye la URL de rastreo basada en la estructura de FlightAware
            const url = `https://es.flightaware.com/live/flight/${flight}`;
            window.open(url, '_blank');
        } else {
            alert("Por favor, introduce un número de vuelo válido.");
        }
    }
</script>

</body>
</html>
