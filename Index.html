<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Radio2"</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #38bdf8; --text: #fff; }
        
        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            font-size: 14px; /* Tamaño optimizado para pantalla pequeña */
        }

        header {
            padding: 5px;
            text-align: center;
            background: #222;
        }

        h1 { font-size: 16px; margin: 5px 0; }
        p { font-size: 11px; margin: 0; color: #aaa; }

        .search-container {
            display: flex;
            padding: 5px;
            gap: 4px;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #111;
            color: white;
            font-size: 12px;
            width: 60%;
        }

        button {
            padding: 8px;
            background: var(--accent);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        .grid {
            padding: 5px;
            padding-bottom: 80px; /* Espacio para el reproductor */
        }

        .station-card {
            background: var(--card);
            padding: 8px;
            margin-bottom: 6px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        .station-card img {
            width: 30px;
            height: 30px;
            border-radius: 4px;
        }

        .station-info h3 {
            font-size: 13px;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .station-info p { font-size: 10px; }

        /* Reproductor ultra-compacto */
        .player-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #222;
            padding: 5px;
            box-sizing: border-box;
            border-top: 1px solid var(--accent);
        }

        #player-info {
            font-size: 10px;
            margin-bottom: 4px;
            text-align: center;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
        }

        audio { width: 100%; height: 30px; }
    </style>
</head>
<body>

<header>
    <h1>🌍 Radio Mundial</h1>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="País o género...">
        <button onclick="searchStations()">Go</button>
    </div>
</header>

<div class="grid" id="stationGrid">
    <p style="text-align:center; padding:20px;">Cargando...</p>
</div>

<div class="player-bar">
    <div id="player-info">Listo para sonar</div>
    <audio id="audioPlayer" controls autoplay></audio>
</div>

<script>
    const stationGrid = document.getElementById('stationGrid');
    const audioPlayer = document.getElementById('audioPlayer');
    const playerInfo = document.getElementById('player-info');

    function searchStations() {
        const query = document.getElementById('searchInput').value || 'topvote';
        stationGrid.innerHTML = '<p style="font-size:12px; text-align:center;">Buscando...</p>';

        // Uso de fetch tradicional para mayor compatibilidad
        fetch('https://de1.api.radio-browser.info/json/stations/byname/' + query + '?limit=15')
            .then(function(response) { return response.json(); })
            .then(function(data) { displayStations(data); })
            .catch(function() { 
                stationGrid.innerHTML = '<p>Error de conexión</p>'; 
            });
    }

    function displayStations(stations) {
        stationGrid.innerHTML = '';
        if(stations.length === 0) {
            stationGrid.innerHTML = '<p>No hay resultados</p>';
            return;
        }

        stations.forEach(function(station) {
            const card = document.createElement('div');
            card.className = 'station-card';
            const imgUrl = station.favicon || 'https://via.placeholder.com/30?text=R';
            
            card.innerHTML = 
                '<img src="' + imgUrl + '">' +
                '<div class="station-info">' +
                    '<h3>' + station.name + '</h3>' +
                    '<p>' + (station.countrycode || 'WW') + ' | ' + station.codec + '</p>' +
                '</div>';
            
            card.onclick = function() {
                audioPlayer.src = station.url_resolved;
                audioPlayer.play();
                playerInfo.innerText = "Sintonizando: " + station.name;
            };
            stationGrid.appendChild(card);
        });
    }

    window.onload = searchStations;
</script>

</body>
</html>
