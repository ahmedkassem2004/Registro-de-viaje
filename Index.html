<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyGlass 110</title>
    <style>
        /* Paleta Windows XP: Azul Luna y Verde Oliva */
        body { 
            background: #005AEE; /* Azul XP */
            color: #000; font-family: "Tahoma", sans-serif; 
            margin: 0; padding: 0; overflow: hidden;
        }
        
        /* Barra de título estilo ventana XP */
        .h { 
            background: linear-gradient(180deg, #0058e6 0%, #2576ff 100%); 
            color: white; padding: 6px; text-align: left; font-weight: bold; 
            font-size: 11px; border-bottom: 1px solid #1a469d;
            box-shadow: inset 0 1px 1px #80adff;
        }

        /* Panel de control color plateado/gris Luna */
        .cp { 
            background: #ECE9D8; border-bottom: 2px solid #716F64;
            padding: 5px; display: flex; gap: 4px;
        }
        
        input { 
            flex: 1; border: 2px solid #7F9DB9; padding: 6px; 
            font-size: 13px; font-weight: bold; outline: none;
        }
        
        /* Botón verde estilo "Iniciar" */
        button { 
            background: linear-gradient(180deg, #43b02a 0%, #338a1e 100%);
            color: white; border: 1px solid #2e7119; padding: 6px 12px;
            font-weight: bold; border-radius: 3px; font-size: 10px;
            text-shadow: 1px 1px #222; box-shadow: 1px 1px 2px #555;
        }

        /* Pantalla de carga simple */
        #ld {
            display: none; text-align: center; padding: 25px 10px;
            background: #fff; color: #005AEE; font-weight: bold; font-size: 12px;
        }

        /* Frame de Google adaptado */
        iframe {
            width: 100%; height: 350px; border: none; 
            display: none; background: #fff;
        }

        .ft { 
            background: #ECE9D8; padding: 8px; text-align: center; 
            color: #000; font-size: 9px; border-top: 1px solid #ACA899;
        }
    </style>
</head>
<body>

<div class="h">💾 SkyGlass 110 - Radar</div>

<div class="cp">
    <input type="text" id="fn" placeholder="AV9710" maxlength="8">
    <button onclick="conectar()">GO</button>
</div>

<div id="ld">ESTABLECIENDO ENLACE...</div>

<iframe id="gf" src=""></iframe>

<div id="it" class="ft">
    <b>Google Flights Data</b><br>Maicao, 2026
</div>

<script>
function conectar() {
    var flight = document.getElementById('fn').value.toUpperCase().trim();
    if(flight === "") return;

    // UI Toggle
    document.getElementById('it').style.display = "none";
    document.getElementById('gf').style.display = "none";
    document.getElementById('ld').style.display = "block";

    // Carga directa para evitar lag en el Nokia
    setTimeout(function() {
        document.getElementById('ld').style.display = "none";
        var frame = document.getElementById('gf');
        frame.style.display = "block";
        frame.src = "https://www.google.com/search?igu=1&q=vuelo+real+status+" + flight;
    }, 800); 
}
</script>

</body>
</html>
