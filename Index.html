<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyGlass 110</title>
    <style>
        /* Diseño optimizado para pantalla de 2 pulgadas (Nokia 110) */
        body { 
            background: #000; color: #fff; font-family: sans-serif; 
            margin: 0; padding: 0; overflow: hidden;
        }
        
        /* Cabecera ultra-compacta */
        .h { 
            background: #4285F4; color: #fff; padding: 6px; 
            text-align: center; font-weight: bold; font-size: 12px;
            border-bottom: 1px solid #fff;
        }
        
        /* Panel de búsqueda en una sola línea */
        .cp { 
            display: flex; padding: 4px; background: #1a1a1a; 
            border-bottom: 1px solid #333;
        }
        
        input { 
            flex: 1; background: #000; color: #0f0; border: 1px solid #4285F4; 
            padding: 8px; font-size: 14px; border-radius: 3px; font-weight: bold;
        }
        
        button { 
            background: #fff; color: #000; border: none; 
            margin-left: 4px; padding: 0 12px; font-weight: bold; 
            border-radius: 3px; font-size: 11px;
        }

        /* Pantalla de carga minimalista */
        #ld {
            display: none; text-align: center; padding: 30px 10px;
            color: #4285F4; font-size: 11px; font-weight: bold;
        }

        /* Contenedor de Google ocupando el resto de la pantalla */
        iframe {
            width: 100%; height: 380px; border: none; 
            display: none; background: #fff;
        }

        .ft { padding: 10px; text-align: center; color: #444; font-size: 9px; }
    </style>
</head>
<body>

<div class="h">SKYGLASS 110</div>

<div class="cp">
    <input type="text" id="fn" placeholder="AV9710" spellcheck="false">
    <button onclick="conectar()">VER</button>
</div>

<div id="ld">BUSCANDO SATÉLITE...</div>

<iframe id="gf" src=""></iframe>

<div id="it" class="ft">
    GOOGLE DATA SOURCE 2026<br>
    LISTO PARA RASTREO
</div>

<script>
function conectar() {
    var flight = document.getElementById('fn').value.toUpperCase().trim();
    if(flight === "") return;

    // Resetear interfaz
    document.getElementById('it').style.display = "none";
    document.getElementById('gf').style.display = "none";
    document.getElementById('ld').style.display = "block";

    // Simulación de conexión rápida (1 segundo)
    setTimeout(function() {
        document.getElementById('ld').style.display = "none";
        var frame = document.getElementById('gf');
        frame.style.display = "block";
        
        /* Conexión directa a Google Search Flight Status */
        frame.src = "https://www.google.com/search?igu=1&q=flight+status+" + flight;
    }, 1000); 
}
</script>

</body>
</html>
