<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTICIAS_GLOBAL</title>
    <style>
        body {
            background: #000;
            color: #fbbf24;
            font-family: monospace;
            margin: 0;
            padding: 2px;
            font-size: 11px;
        }
        .header {
            background: #111;
            padding: 4px;
            border-bottom: 2px solid #fbbf24;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title-top { font-weight: bold; font-size: 10px; color: #fff; }
        button {
            background: #fbbf24;
            color: #000;
            border: none;
            font-weight: bold;
            padding: 3px 8px;
            font-size: 10px;
        }
        .news-row {
            display: block;
            text-decoration: none;
            color: #fbbf24;
            border-bottom: 1px solid #222;
            padding: 8px 4px;
        }
        .news-row:active { background: #333; color: #fff; }
        .source-tag {
            color: #000;
            background: #fbbf24;
            padding: 0 3px;
            font-size: 9px;
            font-weight: bold;
            margin-right: 5px;
        }
        .headline { display: block; margin-top: 4px; line-height: 1.2; }
        .time { color: #888; font-size: 9px; }
        .loading { text-align: center; padding: 30px; }
    </style>
</head>
<body>

<div class="header">
    <span class="title-top">LIVE FEED: COL/M.E.</span>
    <button onclick="loadFeeds()">UPDATE</button>
</div>

<div id="board"></div>

<script>
    const board = document.getElementById('board');
    
    // FUENTES REALES RSS
    const feeds = [
        { name: 'EL TIEMPO', url: 'https://www.eltiempo.com/rss/colombia.xml' },
        { name: 'EL ESPECTADOR', url: 'https://www.elespectador.com/arc/outboundfeeds/rss/' },
        { name: 'RTVC', url: 'https://www.rtvcnoticias.com/feed/' },
        { name: 'AL JAZEERA', url: 'https://www.aljazeera.com/xml/rss/all.xml' },
        { name: 'TRT ARABY', url: 'https://www.trtarabi.com/rss' }
    ];

    async function loadFeeds() {
        board.innerHTML = '<div class="loading">CONECTANDO...</div>';
        
        // Seleccionamos 3 fuentes al azar para no saturar la RAM del Nokia
        const selected = feeds.sort(() => 0.5 - Math.random()).slice(0, 3);
        let allItems = [];

        for (const feed of selected) {
            try {
                const r = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`);
                const d = await r.json();
                if (d.status === 'ok') {
                    d.items.forEach(item => {
                        item.sourceName = feed.name;
                        allItems.push(item);
                    });
                }
            } catch (e) { console.log("Error en: " + feed.name); }
        }

        // Ordenar por fecha (más recientes primero)
        allItems.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));

        display(allItems.slice(0, 20));
    }

    function display(items) {
        board.innerHTML = '';
        if(items.length === 0) {
            board.innerHTML = '<div class="loading">SIN CONEXIÓN</div>';
            return;
        }

        items.forEach(item => {
            const a = document.createElement('a');
            a.className = 'news-row';
            a.href = item.link;
            
            // Limpiar fecha
            const timeStr = item.pubDate.split(' ')[1] + " " + item.pubDate.split(' ')[2];

            a.innerHTML = `
                <span class="source-tag">${item.sourceName}</span>
                <span class="time">${timeStr}</span>
                <span class="headline">${item.title.toUpperCase()}</span>
            `;
            board.appendChild(a);
        });
    }

    window.onload = loadFeeds;
</script>

</body>
</html>
