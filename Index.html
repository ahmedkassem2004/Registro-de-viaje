<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SG110 TERMINAL</title>
    <style>
        /* AJUSTE 2 PULGADAS (240x320) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            width: 240px; height: 320px; 
            background: #000; color: #FFD700; /* Estilo Monitor Aeropuerto */
            font-family: 'Courier New', monospace; 
            text-align: center; overflow: hidden;
            border: 2px solid #333;
        }

        /* HEADER TIPO TABLERO */
        .h { background: #333; color: #FFF; padding: 5px; font-size: 11px; letter-spacing: 1px; }

        .c { padding: 25px 10px; }

        .lbl { font-size: 10px; margin-bottom: 10px; color: #AAA; text-transform: uppercase; }

        /* INPUT ESTILO RADAR */
        input { 
            width: 100%; height: 50px; background: #000; border: 2px solid #FFD700;
            color: #FFD700; font-size: 24px; text-align: center; font-weight: bold;
            margin-bottom: 20px; outline: none;
        }

        /* BOTÓN DE ACCIÓN */
        button { 
            width: 100%; height: 65px; background: #FFD700; 
            color: #000; font-weight: bold; font-size: 18px; border: none;
            cursor: pointer; text-transform: uppercase;
        }

        .f { font-size: 9px; color: #444; margin-top: 35px; border-top: 1px solid #222; padding-top: 5px; }
    </style>
</head>
<body>

<div class="h">FLIGHT INFO - SG110</div>

<div class="c">
    <div class="lbl">SISTEMA DE RASTREO SATELITAL</div>
    <input type="text" id="v" placeholder="N° VUELO" maxlength="10">
    <button onclick="go()">BUSCAR VUELO</button>
    <div class="f">AVIANCA | LATAM | GLOBAL DATA</div>
</div>

<script>
    function go() {
        var n = document.getElementById('v').value.toUpperCase().trim();
        if(!n) return;
        
        var u = "";
        // Lógica de redirección ultra-rápida
        if(n.indexOf("AV") === 0) {
            u = "https://informacionvuelo.avianca.com/es/estado-de-vuelo?flightNumber=" + n;
        } else if(n.indexOf("LA") === 0) {
            u = "https://www.latamairlines.com/co/es/flight-status?flightNumber=" + n;
        } else {
            u = "https://www.flightaware.com/live/flight/" + n;
        }
        window.location.href = u;
    }
</script>

</body>
</html>
