<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SG110 LITE</title>
    <style>
        /* AJUSTE ESTRICTO 240x320 px */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 240px; 
            height: 320px; 
            background: #ECE9D8; 
            font-family: Tahoma, sans-serif; 
            overflow: hidden; 
        }

        /* BARRA SUPERIOR XP */
        .h { 
            background: #0058e6; 
            color: #fff; 
            height: 25px;
            padding: 5px; 
            font-weight: bold; 
            font-size: 10px;
            border-bottom: 1px solid #000;
        }

        /* CONTENEDOR DE PANTALLAS */
        .page { 
            height: 295px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
        }

        /* BOTONES DE ALTO IMPACTO */
        .btn {
            width: 100%; 
            height: 45px;
            border: 1px solid #333; 
            color: #fff; 
            font-weight: bold; 
            font-size: 14px;
            border-radius: 2px;
            margin-bottom: 8px;
            cursor: pointer;
        }
        
        .av { background: #d32f2f; } /* Rojo Avianca */
        .la { background: #1a237e; } /* Azul Latam */
        .go { background: #43b02a; height: 50px; } /* Verde GO */

        /* INPUT DE VUELO */
        input { 
            width: 100%; 
            height: 40px;
            border: 2px solid #7F9DB9; 
            padding: 5px; 
            font-size: 18px; 
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .label { color: #003399; font-size: 11px; font-weight: bold; margin-bottom: 10px; }
        .back { color: #d32f2f; font-size: 10px; text-decoration: underline; margin-top: 15px; }

        #p2 { display: none; }
    </style>
</head>
<body onload="beep(600, 0.05)">

<div class="h">💎 SkyGlass 110 LITE</div>

<div id="p1" class="page">
    <div class="label">SELECCIONE AEROLÍNEA:</div>
    <button class="btn av" onclick="sel('AV')">AVIANCA</button>
    <button class="btn la" onclick="sel('LA')">LATAM</button>
    <div style="font-size: 8px; color: #888; margin-top: 10px;">MAICAO 2026 | SAT-DATA</div>
</div>

<div id="p2" class="page">
    <div class="label" id="lbl">VUELO ---</div>
    <input type="text" id="fn" placeholder="NÚMERO" maxlength="8">
    <button class="btn go" onclick="run()">RASTREAR</button>
    <div class="back" onclick="location.reload()">CAMBIAR AEROLÍNEA</div>
</div>

<script>
    let air = "";
    const actx = new (window.AudioContext || window.webkitAudioContext)();

    function beep(f, d) {
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.connect(g); g.connect(actx.destination);
        o.frequency.value = f; g.gain.value = 0.05;
        o.start(); o.stop(actx.currentTime + d);
    }

    function sel(n) {
        beep(800, 0.05);
        air = n;
        document.getElementById('p1').style.display = 'none';
        document.getElementById('p2').style.display = 'flex';
        document.getElementById('lbl').innerText = "RASTREO " + (n=='AV'?'AVIANCA':'LATAM');
    }

    function run() {
        const v = document.getElementById('fn').value.trim();
        if(!v) return;
        beep(1000, 0.1);
        
        let url = (air == 'AV') 
            ? "https://informacionvuelo.avianca.com/es/estado-de-vuelo?flightNumber=" + v
            : "https://www.latamairlines.com/co/es/flight-status?flightNumber=" + v;
        
        window.location.href = url;
    }
</script>

</body>
</html>
