<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Aero Radar</title>
    <style>
        body { background: #000; color: #fff; font-family: monospace; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Cabecera Aero Marcada */
        .h { 
            background: linear-gradient(180deg, #4285F4 0%, #1a73e8 100%); 
            color: #fff; padding: 10px; text-align: center; font-weight: bold; 
            font-size: 12px; border-bottom: 2px solid #fff;
        }
        
        .control-panel { padding: 8px; background: #111; border-bottom: 1px solid #333; }
        
        input { 
            width: 70%; background: #000; color: #0f0; border: 1px solid #4285F4; 
            padding: 8px; font-size: 14px; font-weight: bold; border-radius: 4px;
        }
        
        button { 
            width: 25%; background: #fff; color: #000; border: none; 
            padding: 8px; font-weight: bold; border-radius: 4px; font-size: 11px;
        }

        /* El contenedor de Google Vuelos */
        #contenedor-google {
            width: 100%;
            height: 350px; /* Ajustado para la pantalla de 2" */
            border: none;
            display: none; /* Se activa al buscar */
            background: #fff;
        }

        .instrucciones { padding: 20px; text-align: center; color: #888; font-size: 10px; }
    </style>
</head>
<body>

<div class="h">AERO RADAR: GOOGLE LIVE</div>

<div class="control-panel">
    <input type="text" id="flightInput" placeholder="AV9710">
    <button onclick="buscarVuelo()">VER</button>
</div>

<iframe id="contenedor-google" src=""></iframe>

<div id="msg" class="instrucciones">
    INGRESA EL N° DE VUELO PARA<br>
    CONECTAR CON GOOGLE SEARCH DATA.
</div>

<script>
function buscarVuelo() {
    var flight = document.getElementById('flightInput').value.toUpperCase().trim();
    if(flight === "") return;

    // Ocultar mensaje y mostrar el iframe
    document.getElementById('msg').style.display = "none";
    var frame = document.getElementById('contenedor-google');
    frame.style.display = "block";

    /* USAMOS GOOGLE SEARCH MODE PARA VUELOS 
       Esto carga la tarjeta de información real (matrícula, mapa, gate)
    */
    frame.src = "https://www.google.com/search?igu=1&q=vuelo+" + flight;
}
</script>

</body>
</html>
