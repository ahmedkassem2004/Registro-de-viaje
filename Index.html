<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyGlass 110 LITE</title>
    <style>
        /* CSS MINIMALISTA - 2 PULGADAS */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            width: 240px; height: 320px; 
            background: #ECE9D8; font-family: Tahoma, sans-serif; 
            font-size: 12px; overflow: hidden;
        }

        /* BARRA XP */
        .h { 
            background: #0058e6; color: #fff; 
            padding: 4px; font-weight: bold; font-size: 10px;
            border-bottom: 1px solid #000;
        }

        /* PANTALLA 1: SELECTOR */
        #p1 { display: flex; flex-direction: column; padding: 10px; gap: 8px; height: 290px; justify-content: center; }
        
        /* BOTONES GRANDES */
        .btn {
            width: 100%; border: 1px solid #000; padding: 12px;
            color: #fff; font-weight: bold; border-radius: 3px;
        }
        .av { background: #d32f2f; } /* Avianca */
        .la { background: #1a237e; } /* Latam */
        .go { background: #43b02a; margin-top: 5px; }

        /* PANTALLA 2: INPUT */
        #p2 { display: none; padding: 15px; text-align: center; }
        
        input { 
            width: 100%; border: 2px solid #7F9DB9; padding: 8px; 
            font-size: 16px; margin-bottom: 10px; font-weight: bold;
        }

        .txt { color: #003399; margin-bottom: 10px; font-weight: bold; font-size: 11px; }
        .back { color: red; text-decoration: underline; font-size: 10px; margin-top: 15px; display: block; }
    </style>
</head>
<body onload="beep(500, 0.05)">

<div class="h">💎 SkyGlass 110 LITE</div>

<div id="p1">
    <div class="txt" style="text-align:center">ELIJA AEROLÍNEA:</div>
    <button class="btn av" onclick="sel('AV')">AVIANCA</button>
    <button class="btn la" onclick="sel('LA')">LATAM</button>
</div>

<div id="p2">
    <div class="txt" id="label">---</div>
    <input type="text" id="fn" placeholder="N° VUELO" maxlength="8">
    <button class="btn go" onclick="run()">BUSCAR AHORA</button>
    <a href="#" class="back" onclick="location.reload()">VOLVER</a>
</div>

<script>
    let airline = "";
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    
    function beep(f, d) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = f; g.gain.value = 0.03;
        o.start(); o.stop(ctx.currentTime + d);
    }

    function sel(n) {
        beep(800, 0.05);
        airline = n;
        document.getElementById('p1').style.display = 'none';
        document.getElementById('p2').style.display = 'block';
        document.getElementById('label').innerText = "VUELO " + (n=='AV'?'AVIANCA':'LATAM');
    }

    function run() {
        const v = document.getElementById('fn').value.trim();
        if(!v) return;
        beep(1000, 0.1);
        
        let url = (airline == 'AV') 
            ? "https://informacionvuelo.avianca.com/es/estado-de-vuelo?flightNumber=" + v
            : "https://www.latamairlines.com/co/es/flight-status?flightNumber=" + v;
        
        window.location.href = url;
    }
</script>

</body>
</html>
