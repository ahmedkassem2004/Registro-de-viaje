<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SG110</title>
    <style>
        /* AJUSTE 2 PULGADAS (240x320) */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            width: 240px; height: 320px; 
            background: #ECE9D8; font-family: sans-serif; 
            text-align: center; overflow: hidden;
        }
        /* BARRA AZUL */
        .h { background: #0058e6; color: #fff; padding: 5px; font-size: 10px; font-weight: bold; }
        
        /* CONTENEDOR */
        .c { padding: 20px 10px; }
        
        /* INPUT Y BOTÓN MAXIMIZADOS PARA PULSAR FÁCIL */
        input { 
            width: 100%; height: 45px; font-size: 22px; 
            text-align: center; margin-bottom: 15px; border: 2px solid #7F9DB9;
        }
        button { 
            width: 100%; height: 60px; background: #43b02a; 
            color: #fff; font-weight: bold; font-size: 18px; border: 1px solid #2e7119;
        }
        .f { font-size: 9px; color: #666; margin-top: 30px; }
    </style>
</head>
<body>

<div class="h">SKYGLASS 110 LITE</div>

<div class="c">
    <input type="text" id="v" placeholder="VUELO" maxlength="10">
    <button onclick="go()">RASTREAR</button>
    <div class="f">AV / LA / GLOBAL</div>
</div>

<script>
    function go() {
        var n = document.getElementById('v').value.toUpperCase().trim();
        if(!n) return;
        
        var u = "";
        // Detección ultra rápida de aerolínea
        if(n.indexOf("AV") === 0) {
            u = "https://informacionvuelo.avianca.com/es/estado-de-vuelo?flightNumber=" + n;
        } else if(n.indexOf("LA") === 0) {
            u = "https://www.latamairlines.com/co/es/flight-status?flightNumber=" + n;
        } else {
            u = "https://www.flightaware.com/live/flight/" + n;
        }
        window.location.href = u;
    }
</script>

</body>
</html>
