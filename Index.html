<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #f4f4f4; color: #333; font-family: sans-serif; margin: 0; padding: 0; }
        .header { background: #D81E05; color: white; padding: 10px; text-align: center; font-weight: bold; border-bottom: 4px solid #b11804; }
        .card { background: white; margin: 5px; padding: 10px; border-radius: 4px; border: 1px solid #ddd; }
        h3 { font-size: 11px; color: #D81E05; margin: 0 0 5px 0; text-transform: uppercase; }
        input, textarea { width: 100%; border: 1px solid #ccc; padding: 8px; box-sizing: border-box; font-size: 14px; margin-bottom: 10px; border-radius: 4px; }
        .qr-area { background: white; text-align: center; padding: 10px; }
        #qrImg { width: 140px; height: 140px; display: none; margin: 10px auto; border: 5px solid white; box-shadow: 0 0 5px #ccc; }
        .btn { border: none; width: 100%; padding: 12px; font-weight: bold; cursor: pointer; border-radius: 4px; margin-bottom: 5px; }
        .btn-red { background: #D81E05; color: white; }
        .btn-blue { background: #1a73e8; color: white; } /* Color Google */
        .btn-black { background: #000; color: white; }
    </style>
</head>
<body>

<div class="header">AVIANCA FLIGHT INFO</div>

<div class="card">
    <h3>✈️ INFO DE VUELO</h3>
    <input type="text" id="vuelo" placeholder="No. Vuelo (Ej: AV9212)">
    <button class="btn btn-blue" onclick="consultarGoogle()">🔍 BUSCAR EN GOOGLE</button>
    
    <input type="text" id="asiento" placeholder="Asiento (Ej: 14A)">
    
    <h3>📝 CHECK-LIST / NOTAS</h3>
    <textarea id="notas" style="height: 60px;" placeholder="Documentos, maletas..."></textarea>
</div>

<div class="qr-area">
    <h3>🎫 BOARDING PASS QR</h3>
    <img id="qrImg" src="" alt="QR">
    <input type="text" id="qrData" placeholder="URL de la imagen del QR">
    <button class="btn btn-red" onclick="generarQR()">ACTUALIZAR QR</button>
</div>

<div style="padding: 5px;">
    <button class="btn btn-black" onclick="guardar()">💾 GUARDAR EN NOKIA</button>
</div>

<script>
    window.onload = function() {
        document.getElementById('vuelo').value = localStorage.getItem('f_vuelo') || "";
        document.getElementById('asiento').value = localStorage.getItem('f_asiento') || "";
        document.getElementById('notas').value = localStorage.getItem('f_notas') || "";
        let savedQR = localStorage.getItem('f_qr');
        if(savedQR) {
            document.getElementById('qrImg').src = savedQR;
            document.getElementById('qrImg').style.display = "block";
        }
    }

    // FUNCIÓN PARA USAR GOOGLE COMO BANCO DE DATOS
    function consultarGoogle() {
        let nVuelo = document.getElementById('vuelo').value;
        if(nVuelo) {
            // Genera la URL de búsqueda de Google para vuelos
            let url = "https://www.google.com/search?q=vuelo+" + encodeURIComponent(nVuelo);
            window.open(url, '_blank');
        } else {
            alert("Escribe un número de vuelo");
        }
    }

    function generarQR() {
        let url = document.getElementById('qrData').value;
        if(url) {
            document.getElementById('qrImg').src = url;
            document.getElementById('qrImg').style.display = "block";
        }
    }

    function guardar() {
        localStorage.setItem('f_vuelo', document.getElementById('vuelo').value);
        localStorage.setItem('f_asiento', document.getElementById('asiento').value);
        localStorage.setItem('f_notas', document.getElementById('notas').value);
        localStorage.setItem('f_qr', document.getElementById('qrImg').src);
        alert("¡Info de viaje guardada!");
    }
</script>

</body>
</html>
