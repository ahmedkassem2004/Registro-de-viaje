<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyGlass 110 - Airlines</title>
    <style>
        /* FIX 2 PULGADAS FIJAS (240x320 px) */
        * { box-sizing: border-box; }
        body, html { 
            width: 240px; height: 320px; margin: 0; padding: 0; 
            background: #ECE9D8; font-family: 'Tahoma', sans-serif; overflow: hidden;
        }

        /* BARRA TÍTULO XP */
        .h { 
            background: linear-gradient(180deg, #0058e6 0%, #2576ff 100%); 
            color: white; padding: 5px; font-weight: bold; font-size: 11px;
            border-bottom: 1px solid #1a469d; display: flex; justify-content: space-between;
        }

        /* PANTALLA DE SELECCIÓN */
        #selector-screen {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 295px; gap: 10px; padding: 15px;
        }

        .air-btn {
            width: 100%; padding: 15px; border-radius: 5px; border: 1px solid #716F64;
            font-weight: bold; font-size: 13px; cursor: pointer; color: white;
            text-shadow: 1px 1px 2px #000; box-shadow: 1px 2px 3px #888;
        }
        .av { background: linear-gradient(180deg, #E21717 0%, #B01010 100%); } /* Avianca Red */
        .la { background: linear-gradient(180deg, #1B0088 0%, #0D0044 100%); } /* LATAM Blue */

        /* PANTALLA DE RASTREO */
        #tracker-screen { display: none; padding: 5px; }
        
        .cp { display: flex; gap: 2px; margin-bottom: 5px; }
        input { flex: 1; border: 2px solid #7F9DB9; padding: 8px; font-size: 14px; font-weight: bold; outline: none; }
        .go-btn { background: #43b02a; color: white; border: 1px solid #2e7119; padding: 8px; font-weight: bold; border-radius: 2px; }

        #msg { text-align: center; color: #003399; font-size: 11px; padding-top: 50px; }
        .back-link { font-size: 10px; color: #E21717; text-decoration: underline; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body onload="beep(500, 0.05)">

<div class="h">
    <span>💎 SkyGlass 110 - SatLink</span>
    <span id="clock">00:00</span>
</div>

<div id="selector-screen">
    <div style="font-size: 11px; font-weight: bold; color: #333; margin-bottom: 5px;">SELECT AIRLINE:</div>
    <button class="air-btn av" onclick="setAirline('AVIANCA')">AVIANCA</button>
    <button class="air-btn la" onclick="setAirline('LATAM')">LATAM</button>
    <div style="font-size: 9px; color: #888; margin-top: 10px;">MAICAO DATA SOURCE 2026</div>
</div>

<div id="tracker-screen">
    <div style="font-size: 10px; font-weight: bold; margin-bottom: 4px;" id="target-label">READY</div>
    <div class="cp">
        <input type="text" id="fn" placeholder="N° VUELO" maxlength="8">
        <button class="go-btn" onclick="launch()">GO</button>
    </div>
    <div id="msg">
        Sincronizando con base de datos real...
        <br><br>
        <span class="back-link" onclick="location.reload()">[ CAMBIAR AEROLÍNEA ]</span>
    </div>
</div>

<script>
    let selectedAirline = "";
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function beep(f, d) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.value = 0.05;
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    // Reloj
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes();
    }, 1000);

    function setAirline(name) {
        beep(800, 0.05);
        selectedAirline = name;
        document.getElementById('selector-screen').style.display = 'none';
        document.getElementById('tracker-screen').style.display = 'block';
        document.getElementById('target-label').innerText = "TRACKING: " + name;
    }

    function launch() {
        const val = document.getElementById('fn').value.trim();
        if(!val) return;
        
        beep(1200, 0.1);
        document.getElementById('msg').innerHTML = "<b>ESTABLECIENDO ENLACE...</b>";

        setTimeout(() => {
            let url = "";
            if(selectedAirline === 'AVIANCA') {
                // Avianca usa el número de vuelo al final del link o vía búsqueda
                url = "https://informacionvuelo.avianca.com/es/estado-de-vuelo?flightNumber=" + val;
            } else {
                // LATAM requiere el código de aerolínea + número
                url = "https://www.latamairlines.com/co/es/flight-status?flightNumber=" + val;
            }
            // Abrimos directo para evitar bloqueos de Frame y ver datos reales
            window.location.href = url;
        }, 800);
    }
</script>

</body>
</html>
