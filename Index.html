<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyGlass 110 - Dual Link</title>
    <style>
        /* FIX 2 PULGADAS FIJAS (240x320) */
        * { box-sizing: border-box; }
        body { 
            width: 240px; height: 320px; margin: 0; padding: 0; 
            background: #ECE9D8; font-family: 'Tahoma', sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* BARRA TÍTULO XP */
        .h { 
            background: linear-gradient(180deg, #0058e6 0%, #2576ff 100%); 
            color: white; padding: 5px; font-weight: bold; font-size: 11px;
            border-bottom: 1px solid #1a469d; display: flex; justify-content: space-between;
        }

        .main { padding: 12px; text-align: center; flex: 1; display: flex; flex-direction: column; }

        /* BUSCADOR */
        .label { font-size: 10px; color: #003399; font-weight: bold; margin-bottom: 5px; text-align: left; }
        input { 
            width: 100%; border: 2px solid #7F9DB9; padding: 10px; 
            font-size: 18px; font-weight: bold; text-align: center; margin-bottom: 12px;
            background: #FFF; outline: none;
        }

        /* BOTONES XP */
        .btn { 
            width: 100%; background: linear-gradient(180deg, #43b02a 0%, #338a1e 100%);
            color: white; border: 1px solid #2e7119; padding: 12px;
            font-weight: bold; font-size: 13px; border-radius: 3px;
            box-shadow: 1px 2px 2px #555; margin-bottom: 8px;
        }

        .btn-latam { background: linear-gradient(180deg, #ff0011 0%, #b3000c 100%); border-color: #800008; }

        /* STATUS */
        #st { font-size: 10px; font-weight: bold; color: #005AEE; margin-top: 5px; display: none; }
        .footer { font-size: 8px; color: #666; margin-top: auto; border-top: 1px solid #ACA899; padding-top: 4px; }
    </style>
</head>
<body onload="beep(500, 0.1)">

<div class="h">
    <span>💎 SkyGlass 110 - Dual</span>
    <span id="clock">00:00</span>
</div>

<div class="main">
    <div class="label">NÚMERO DE VUELO:</div>
    <input type="text" id="fn" placeholder="AV9710 / LA4022" maxlength="10">
    
    <button class="btn" onclick="track('AUTO')">AUTO DETECTAR</button>
    
    <div id="st">ENLAZANDO SATÉLITE...</div>

    <div class="footer">
        AVIANCA | LATAM | 2026<br>
        SISTEMA DE RASTREO MAICAO
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.value = 0.05;
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    // Reloj en tiempo real
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + (d.getMinutes()<10?'0':'') + d.getMinutes();
    }, 1000);

    function track() {
        let val = document.getElementById('fn').value.toUpperCase().trim();
        if(!val) return;

        beep(800, 0.05);
        document.getElementById('st').style.display = "block";

        setTimeout(() => {
            beep(1200, 0.1);
            
            // LÓGICA DE DETECCIÓN DE AEROLÍNEA
            if(val.startsWith("AV") || val.startsWith("AVA")) {
                // Redirigir a AVIANCA (Extrae solo números para su web)
                let num = val.replace(/\D/g,'');
                window.location.href = "https://informacionvuelo.avianca.com/es/estado-de-vuelo?flightNumber=" + num;
            } 
            else if(val.startsWith("LA") || val.startsWith("LAN") || val.startsWith("LPE")) {
                // Redirigir a LATAM
                window.location.href = "https://www.latamairlines.com/co/es/flight-status/vuelo/" + val;
            } 
            else {
                // Si no detecta, usa el buscador global para encontrar la matrícula
                window.location.href = "https://www.google.com/search?q=flight+status+" + val;
            }
        }, 1000);
    }
</script>

</body>
</html>
