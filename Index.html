<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SkyGlass 110</title>
    <style>
        /* FIX 2 PULGADAS: 240x320 px */
        * { box-sizing: border-box; }
        body, html { 
            width: 240px; height: 320px; 
            margin: 0; padding: 0; overflow: hidden; 
            background: #0058E6; font-family: 'Tahoma', sans-serif;
        }

        /* PANTALLA CARGA AUTOMÁTICA (2 SEG) */
        #boot {
            position: fixed; width: 240px; height: 320px;
            background: #000; color: #fff; z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .bar { width: 100px; height: 8px; border: 1px solid #777; padding: 1px; margin-top: 10px; }
        .fill { width: 0%; height: 100%; background: #2576ff; animation: load 2s forwards linear; }
        @keyframes load { to { width: 100%; } }

        /* GUI PRINCIPAL */
        .h { 
            background: linear-gradient(180deg, #0058e6 0%, #2576ff 100%); 
            color: white; padding: 5px; font-weight: bold; font-size: 11px;
            border-bottom: 1px solid #1a469d; display: flex; justify-content: space-between;
        }
        .cp { background: #ECE9D8; padding: 5px; display: flex; border-bottom: 1px solid #716F64; }
        input { flex: 1; border: 1px solid #7F9DB9; padding: 4px; font-size: 12px; outline: none; }
        button { 
            background: linear-gradient(180deg, #43b02a 0%, #338a1e 100%);
            color: white; border: 1px solid #2e7119; padding: 4px 8px;
            font-weight: bold; font-size: 10px; margin-left: 2px;
        }

        /* ÁREA DE RESULTADOS */
        #content { width: 240px; height: 255px; background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        #msg { padding: 40px 10px; text-align: center; color: #333; font-size: 11px; }
        
        /* LOADER RADAR */
        #radar { display: none; text-align: center; padding-top: 50px; color: #0058E6; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body onload="bootSystem()">

<div id="boot">
    <div style="font-size: 14px; font-weight: bold;">SkyGlass 110</div>
    <div class="bar"><div class="fill"></div></div>
    <div style="font-size: 8px; color: #666; margin-top: 5px;">CARGANDO KERNEL...</div>
</div>

<div class="h">
    <span>💎 SkyGlass 110</span>
    <span>[X]</span>
</div>

<div class="cp">
    <input type="text" id="fn" placeholder="VUELO (AV9710)">
    <button onclick="conectar()">GO</button>
</div>

<div id="content">
    <div id="msg"><b>ESPERANDO DATOS</b><br>Ingresa número de vuelo</div>
    <div id="radar">SINCRO SATELITAL...</div>
    <iframe id="gf" src=""></iframe>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.value = f; g.gain.value = 0.05;
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    function bootSystem() {
        setTimeout(() => {
            beep(600, 0.1);
            document.getElementById('boot').style.display = 'none';
        }, 2000);
    }

    function conectar() {
        const val = document.getElementById('fn').value.toUpperCase().trim();
        if(!val) return;

        beep(800, 0.05);
        document.getElementById('msg').style.display = "none";
        document.getElementById('gf').style.display = "none";
        document.getElementById('radar').style.display = "block";

        setTimeout(() => {
            beep(1000, 0.1);
            document.getElementById('radar').style.display = "none";
            const frame = document.getElementById('gf');
            frame.style.display = "block";
            frame.src = "https://www.google.com/search?igu=1&q=flight+status+" + val;
        }, 1200);
    }
</script>

</body>
</html>
