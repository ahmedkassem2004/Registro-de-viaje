<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyGlass 110</title>
    <style>
        /* Estetica Windows XP Retro-Elegante */
        body { 
            background: #005AEE; /* Azul XP Clásico */
            color: #000; font-family: "Tahoma", sans-serif; 
            margin: 0; padding: 0; overflow: hidden;
        }
        
        /* Barra de Título Windows XP Luna */
        .h { 
            background: linear-gradient(180deg, #0997FF 0%, #0053EE 8%, #0053EE 92%, #0840A5 100%);
            color: #fff; padding: 6px; text-align: left; font-weight: bold; 
            font-size: 11px; border-bottom: 1px solid #0840A5;
            display: flex; justify-content: space-between; align-items: center;
        }

        /* Contenedor Principal (Ventana) */
        .window {
            background: #ECE9D8; /* Color de ventana XP */
            border: 3px solid #0053EE; border-top: none;
            height: 100vh; display: flex; flex-direction: column;
        }
        
        /* Panel de Búsqueda */
        .cp { 
            padding: 6px; display: flex; gap: 4px;
            background: #F4F4F4; border-bottom: 1px solid #999;
        }
        
        input { 
            flex: 1; background: #fff; color: #000; border: 1px solid #7F9DB9; 
            padding: 5px; font-size: 12px;
        }
        
        button { 
            background: linear-gradient(180deg, #fff 0%, #ECE9D8 100%);
            border: 1px solid #003C74; color: #000; 
            padding: 4px 8px; font-size: 10px; font-weight: bold;
            border-radius: 3px; cursor: pointer;
        }

        /* Pantalla de Carga (Reloj de arena estilo XP) */
        #ld {
            display: none; text-align: center; padding: 40px 10px;
            color: #000; font-size: 11px; font-weight: bold;
        }

        /* Visor de Google (Iframe) */
        iframe {
            width: 100%; flex-grow: 1; border: none; 
            display: none; background: #fff;
        }

        .ft { padding: 4px; text-align: center; color: #666; font-size: 9px; background: #ECE9D8; }
    </style>
</head>
<body>

<div class="window">
    <div class="h">
        <span>SkyGlass 110</span>
        <span style="font-size: 10px;">[X]</span>
    </div>

    <div class="cp">
        <input type="text" id="fn" placeholder="Vuelo..." spellcheck="false">
        <button onclick="conectar()">RASTREAR</button>
    </div>

    <div id="ld">
        <div style="font-size: 20px; margin-bottom: 5px;">⏳</div>
        CONECTANDO...
    </div>

    <iframe id="gf" src=""></iframe>

    <div id="it" class="ft">
        Source: Google Flights 2026
    </div>
</div>

<script>
function conectar() {
    var flight = document.getElementById('fn').value.toUpperCase().trim();
    if(flight === "") return;

    // Reset UI
    document.getElementById('it').style.display = "none";
    document.getElementById('gf').style.display = "none";
    document.getElementById('ld').style.display = "block";

    // Simulación de carga estable
    setTimeout(function() {
        document.getElementById('ld').style.display = "none";
        var frame = document.getElementById('gf');
        frame.style.display = "block";
        
        // Uso de IGU para incrustar búsqueda de Google
        frame.src = "https://www.google.com/search?igu=1&q=flight+status+" + flight;
    }, 1200); 
}
</script>

</body>
</html>
